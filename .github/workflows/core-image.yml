name: Core image

on:
  push:
    branches:
      - master
    paths:
      - "core/**"
      - ".github/workflows/core-image.yml"
  pull_request:
    paths:
      - "core/**"
      - ".github/workflows/core-image.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy this ref to the production environment
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: archura_test
          POSTGRES_USER: archura
          POSTGRES_PASSWORD: test-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U archura -d archura_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      TEST_DATABASE_URL: postgres://archura:test-only-password@127.0.0.1:5432/archura_test?sslmode=disable
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum
      - run: go test -race ./...
      - run: go vet ./...

  publish:
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish immutable image
        id: image
        env:
          REGISTRY_OWNER: ${{ github.repository_owner }}
        run: |
          owner=$(printf '%s' "$REGISTRY_OWNER" | tr '[:upper:]' '[:lower:]')
          image="ghcr.io/$owner/archura-core:git-$GITHUB_SHA"
          docker build \
            --build-arg VERSION="git-$GITHUB_SHA" \
            --build-arg COMMIT="$GITHUB_SHA" \
            --build-arg BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --tag "$image" \
            core
          docker push "$image"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "Published $image"

  deploy:
    needs: publish
    if: github.event_name == 'push' || inputs.deploy
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: core-production
      cancel-in-progress: false
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Connect to the tailnet
        # The Hetzner firewall admits port 22 only from our own IPs, so the
        # runner reaches the box over Tailscale (WireGuard) instead of the
        # public internet. Ephemeral node — leaves the tailnet when the job ends.
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
      - name: Diagnose tailnet reachability
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          set +e
          echo "== runner tailscale IPs =="
          tailscale ip
          echo "== tailnet peers =="
          tailscale status
          echo "== is HETZNER_HOST a tailnet address? =="
          case "$HETZNER_HOST" in
            100.*) echo "HETZNER_HOST looks like a Tailscale IP ($HETZNER_HOST) — good" ;;
            *) echo "WARNING: HETZNER_HOST=$HETZNER_HOST is NOT a 100.x Tailscale IP. Set it to the box's 'tailscale ip -4'." ;;
          esac
          echo "== tailscale ping to $HETZNER_HOST =="
          tailscale ping -c 4 "$HETZNER_HOST"
          echo "(diagnostics only; the SSH step below is what gates the deploy)"
      - name: Configure verified SSH access over Tailscale
        env:
          # HETZNER_HOST must be the box's Tailscale address (100.x.y.z or its
          # MagicDNS name), not the public IP — that is what the firewall and
          # this tunnel now use.
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
        run: |
          set -Eeuo pipefail

          require_secret() {
            local name="$1"
            local value="$2"
            if [[ -z "$value" ]]; then
              echo "::error title=Missing production secret::$name is not available to the production environment"
              exit 1
            fi
          }

          require_secret HETZNER_HOST "$HETZNER_HOST"
          require_secret HETZNER_USER "$HETZNER_USER"
          require_secret HETZNER_SSH_PRIVATE_KEY "$HETZNER_SSH_PRIVATE_KEY"

          install -d -m 0700 "$HOME/.ssh"
          printf '%s\n' "$HETZNER_SSH_PRIVATE_KEY" > "$HOME/.ssh/hetzner"
          chmod 0600 "$HOME/.ssh/hetzner"

          if ! ssh-keygen -y -P "" -f "$HOME/.ssh/hetzner" >/dev/null 2>&1; then
            echo "::error title=Invalid SSH private key::HETZNER_SSH_PRIVATE_KEY is malformed or requires a passphrase"
            exit 1
          fi

          # Pin the host key by scanning it over the Tailscale tunnel. WireGuard
          # has already authenticated the peer, so this is trust-on-first-use
          # over a cryptographically authenticated channel — the scanned key is
          # provably the real box's. Retry while Tailscale settles its routes.
          for attempt in $(seq 1 30); do
            if ssh-keyscan -T 5 "$HETZNER_HOST" > "$HOME/.ssh/known_hosts" 2>/dev/null \
              && [[ -s "$HOME/.ssh/known_hosts" ]]; then
              break
            fi
            sleep 2
          done
          chmod 0600 "$HOME/.ssh/known_hosts"
          if [[ ! -s "$HOME/.ssh/known_hosts" ]]; then
            echo "::error title=Host unreachable::could not reach $HETZNER_HOST over Tailscale"
            exit 1
          fi
      - name: Deploy exact image to Hetzner
        env:
          CORE_IMAGE: ${{ needs.publish.outputs.image }}
          GHCR_TOKEN: ${{ github.token }}
          GHCR_USER: ${{ github.actor }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
        run: |
          set -Eeuo pipefail
          [[ "$CORE_IMAGE" =~ ^ghcr\.io/[a-z0-9._/-]+:git-[0-9a-f]{40}$ ]]
          test -n "$GHCR_USER"
          test "${#GHCR_USER}" -le 100

          target="$HETZNER_USER@$HETZNER_HOST"
          ssh_options=(
            -i "$HOME/.ssh/hetzner"
            -o BatchMode=yes
            -o StrictHostKeyChecking=yes
          )

          ssh "${ssh_options[@]}" "$target" \
            'test -d /opt/archura && test -w /opt/archura && command -v docker >/dev/null'

          tar -czf - core/deploy/hetzner | \
            ssh "${ssh_options[@]}" "$target" 'tar -xzf - -C /opt/archura'

          printf -v quoted_image '%q' "$CORE_IMAGE"
          printf -v quoted_user '%q' "$GHCR_USER"
          printf '%s' "$GHCR_TOKEN" | \
            ssh "${ssh_options[@]}" "$target" \
              "/opt/archura/core/deploy/hetzner/release-from-ghcr.sh $quoted_image $quoted_user"
