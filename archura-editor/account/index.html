<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Your Archura account</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; background: #f7f7f8; color: #18181b; font: 15px/1.5 Inter, ui-sans-serif, system-ui, sans-serif; }
      nav { display: flex; align-items: center; justify-content: space-between; gap: 18px; padding: 18px 28px; border-bottom: 1px solid #e4e4e7; background: white; }
      nav a { color: inherit; text-decoration: none; }
      nav strong { font-size: 1rem; }
      main { width: min(920px, calc(100% - 32px)); margin: 44px auto; }
      h1 { margin: 0; font-size: clamp(1.8rem, 5vw, 2.5rem); letter-spacing: -0.035em; }
      h2 { margin: 0; font-size: 1.05rem; }
      p { margin: 0; }
      .muted { color: #71717a; }
      .small { font-size: 0.84rem; }
      .page-heading, .section-heading, .identity, .organization, .invitation, .row, .actions { display: flex; align-items: center; }
      .page-heading, .section-heading, .identity, .organization, .invitation { justify-content: space-between; gap: 18px; }
      .page-heading { align-items: end; margin-bottom: 32px; }
      .section-heading { margin: 32px 0 8px; }
      .card { background: white; border: 1px solid #e4e4e7; border-radius: 14px; padding: 20px; }
      .identity-copy, .organization-copy, .invitation-copy { display: grid; gap: 4px; min-width: 0; }
      .identity-email, .organization-name { font-weight: 650; }
      .verified { color: #15803d; }
      .list { border-top: 1px solid #e4e4e7; }
      .organization, .invitation { padding: 18px 0; border-bottom: 1px solid #e4e4e7; }
      .row, .actions { flex-wrap: wrap; gap: 8px; }
      .mark { display: grid; place-items: center; width: 40px; height: 40px; flex: 0 0 40px; border-radius: 50%; background: #eef2ff; color: #3730a3; font-weight: 700; }
      .badge { border: 1px solid #d4d4d8; border-radius: 999px; padding: 2px 8px; color: #52525b; font-size: 0.76rem; }
      button, .button { appearance: none; border: 1px solid #d4d4d8; border-radius: 8px; padding: 9px 13px; background: white; color: #18181b; cursor: pointer; font: inherit; font-size: 0.86rem; font-weight: 650; text-decoration: none; }
      button.primary, .button.primary { border-color: #18181b; background: #18181b; color: white; }
      button.ghost { border-color: transparent; background: transparent; }
      button:disabled { cursor: wait; opacity: 0.55; }
      details { position: relative; }
      summary { list-style: none; }
      summary::-webkit-details-marker { display: none; }
      .create-panel { position: absolute; z-index: 2; top: 46px; right: 0; width: min(360px, calc(100vw - 32px)); padding: 18px; background: white; border: 1px solid #d4d4d8; border-radius: 12px; box-shadow: 0 12px 35px rgb(0 0 0 / 12%); }
      form { display: grid; gap: 10px; }
      label { display: grid; gap: 5px; font-size: 0.82rem; font-weight: 650; }
      input { width: 100%; padding: 10px 11px; border: 1px solid #d4d4d8; border-radius: 8px; font: inherit; }
      .message { min-height: 1.3em; color: #b91c1c; font-size: 0.82rem; }
      .notice { margin-bottom: 18px; border-color: #c7d2fe; background: #eef2ff; color: #3730a3; }
      .empty { padding: 22px 0; border-bottom: 1px solid #e4e4e7; color: #71717a; }
      @media (max-width: 620px) {
        nav { padding: 16px; }
        main { margin-top: 28px; }
        .page-heading, .identity, .organization, .invitation { align-items: flex-start; flex-direction: column; }
        .page-heading .button, .organization > .actions { width: 100%; }
        .organization > .actions .button { width: 100%; text-align: center; }
      }
    </style>
  </head>
  <body>
    <nav><a href="/"><strong>Archura</strong></a><button class="ghost" id="signout" hidden>Sign out</button></nav>
    <main id="main"><p class="muted">Loading your account…</p></main>
    <script type="module">
      const main = document.getElementById('main');
      const signout = document.getElementById('signout');
      const escapeHtml = (value) => String(value ?? '')
        .replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;').replaceAll("'", '&#039;');

      function renderRegister() {
        const invited = new URLSearchParams(location.search).has('invitation');
        main.innerHTML = `
          ${invited ? '<div class="card notice">Sign in with the email address that received the invitation.</div>' : ''}
          <section class="card">
            <h1>Sign in to Archura</h1>
            <p class="muted">Enter your email and we’ll send you a secure sign-in link.</p>
            <form id="register" style="margin-top:22px">
              <label>Email address<input name="email" type="email" autocomplete="email" placeholder="you@example.com" required /></label>
              <button class="primary" type="submit">Send sign-in link</button>
              <p class="message" aria-live="polite"></p>
            </form>
          </section>`;
        main.querySelector('#register').addEventListener('submit', async (event) => {
          event.preventDefault();
          const form = event.currentTarget;
          const button = form.querySelector('button');
          const message = form.querySelector('.message');
          button.disabled = true;
          const response = await fetch('/api/register', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: form.email.value.trim() }),
          }).catch(() => null);
          button.disabled = false;
          if (!response?.ok) {
            message.textContent = response?.status === 429 ? 'Too many attempts. Please wait and try again.' : 'Could not send the link.';
            return;
          }
          main.innerHTML = `<section class="card"><h1>Check your email</h1><p class="muted">Open the link we sent to finish signing in.</p><p class="small" style="margin-top:14px"><a href="/dev-mail/">Running locally? Open the development mailbox.</a></p></section>`;
        });
      }

      function renderAccount(me) {
        signout.hidden = false;
        const organizations = me.organizations ?? [];
        const invitations = me.invitations ?? [];
        main.innerHTML = `
          <header class="page-heading">
            <div><h1>Your account</h1><p class="muted">Choose a business to enter its dashboard.</p></div>
            <details><summary class="button primary">Create organization</summary>
              <div class="create-panel">
                <form id="create-organization">
                  <label>Business name<input name="name" autocomplete="organization" required /></label>
                  <label>URL slug<input name="slug" pattern="[a-z0-9](?:[a-z0-9\\-]{0,61}[a-z0-9])?" required /></label>
                  <button class="primary" type="submit">Create</button><p class="message" aria-live="polite"></p>
                </form>
              </div>
            </details>
          </header>
          <section class="card identity">
            <div class="identity-copy"><span class="small muted">SIGNED IN AS</span><span class="identity-email">${escapeHtml(me.email)}</span>
              <span class="small ${me.email_verified_at ? 'verified' : 'muted'}">${me.email_verified_at ? 'Email verified' : 'Email verification unavailable'}</span>
            </div>
          </section>
          <section aria-labelledby="organizations-title">
            <div class="section-heading"><h2 id="organizations-title">Organizations</h2><span class="small muted">${organizations.length} membership${organizations.length === 1 ? '' : 's'}</span></div>
            <div class="list">${organizations.map((organization) => {
              const count = organization.component_count == null ? 'Components unavailable' : `${organization.component_count} component${organization.component_count === 1 ? '' : 's'}`;
              const sites = organization.sites?.length ?? 0;
              return `<article class="organization"><div class="row"><span class="mark" aria-hidden="true">${escapeHtml(organization.name?.slice(0, 1).toUpperCase() || 'O')}</span>
                <div class="organization-copy"><span class="organization-name">${escapeHtml(organization.name)}</span><div class="row"><span class="badge">${escapeHtml(organization.role)}</span>${organization.is_default ? '<span class="badge">Default</span>' : ''}<span class="small muted">${sites} site${sites === 1 ? '' : 's'} · ${count}</span></div></div></div>
                <div class="actions"><a class="button ${organization.is_default ? 'primary' : ''}" href="/dashboard/?organization=${encodeURIComponent(organization.id)}">Open dashboard</a></div></article>`;
            }).join('') || '<div class="empty">No organizations yet.</div>'}</div>
          </section>
          <section aria-labelledby="invitations-title">
            <div class="section-heading"><h2 id="invitations-title">Invitations</h2><span class="small muted">${invitations.length} pending</span></div>
            <div class="list">${invitations.map((invitation) => `<article class="invitation" data-invitation="${escapeHtml(invitation.id)}">
              <div class="invitation-copy"><span class="organization-name">${escapeHtml(invitation.organization?.name)}</span><span class="small muted">Invited by ${escapeHtml(invitation.invited_by)} · ${escapeHtml(invitation.role)} · Expires ${new Date(invitation.expires_at).toLocaleDateString()}</span></div>
              <div class="actions"><button class="ghost" data-action="decline">Decline</button><button data-action="accept">Accept</button></div></article>`).join('') || '<div class="empty">No pending invitations.</div>'}</div>
          </section>`;

        main.querySelector('#create-organization').addEventListener('submit', async (event) => {
          event.preventDefault();
          const form = event.currentTarget;
          const message = form.querySelector('.message');
          const response = await fetch('/api/organizations', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: form.name.value.trim(), slug: form.slug.value.trim().toLowerCase() }),
          }).catch(() => null);
          if (!response?.ok) {
            message.textContent = response?.status === 409 ? 'That slug is already in use.' : 'Could not create the organization.';
            return;
          }
          const organization = await response.json();
          location.href = `/dashboard/?organization=${encodeURIComponent(organization.id)}`;
        });
        main.querySelectorAll('[data-invitation]').forEach((row) => {
          row.addEventListener('click', async (event) => {
            const action = event.target.closest('[data-action]')?.dataset.action;
            if (!action) return;
            const buttons = row.querySelectorAll('button');
            buttons.forEach((button) => { button.disabled = true; });
            const response = await fetch(`/api/invitations/${encodeURIComponent(row.dataset.invitation)}/${action}`, { method: 'POST' }).catch(() => null);
            if (!response?.ok) {
              buttons.forEach((button) => { button.disabled = false; });
              return;
            }
            await init();
          });
        });
      }

      async function init() {
        const response = await fetch('/api/me').catch(() => null);
        if (!response?.ok) {
          signout.hidden = true;
          renderRegister();
          return;
        }
        renderAccount(await response.json());
      }
      signout.addEventListener('click', async () => {
        await fetch('/api/logout', { method: 'POST' }).catch(() => {});
        location.href = '/account/';
      });
      init();
    </script>
  </body>
</html>
