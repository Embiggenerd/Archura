<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Archura Dashboard</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0; min-height: 100vh; background: #f3f4f6;
        font-family: Helvetica, Arial, sans-serif; color: #111827;
      }
      header {
        display: flex; align-items: baseline; gap: 12px;
        padding: 14px 28px; background: #111827; color: #e5e7eb;
      }
      header h1 { font-size: 1rem; margin: 0; }
      header .email { color: #9ca3af; font-size: 0.85rem; }
      header .organization { color: #c7d2fe; font-size: 0.85rem; }
      header .account-link { margin-left: auto; color: #e5e7eb; font-size: 0.82rem; text-decoration: none; }
      header .signout {
        padding: 5px 12px; border: none; border-radius: 6px;
        background: #374151; color: white; font-size: 0.8rem; font-weight: 600;
        cursor: pointer; display: none;
      }
      main { max-width: 760px; margin: 24px auto; padding: 0 16px; }
      .card {
        background: white; border: 1px solid #e5e7eb; border-radius: 14px;
        padding: 22px; margin-bottom: 18px;
      }
      .card h2 { margin: 0 0 4px; font-size: 1.1rem; }
      .card p.hint { margin: 0 0 14px; color: #6b7280; font-size: 0.9rem; }
      .actions { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
      .actions a, .actions button {
        padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer;
        background: #4f46e5; color: white; font-size: 0.82rem; font-weight: 600;
        text-decoration: none;
      }
      .actions .secondary { background: #374151; }
      ul.entries { margin: 8px 0 0; padding-left: 18px; color: #374151; font-size: 0.85rem; }
      pre.snippet {
        background: #111827; color: #e5e7eb; padding: 10px; border-radius: 8px;
        overflow-x: auto; font-size: 0.75rem;
      }
      form { display: flex; gap: 8px; }
      input {
        flex: 1; padding: 10px 12px; border: 1px solid #d1d5db;
        border-radius: 8px; font-size: 0.95rem;
      }
      form button {
        padding: 10px 18px; border: none; border-radius: 8px;
        background: #111827; color: white; font-weight: 600; cursor: pointer;
      }
      .error { color: #dc2626; font-size: 0.85rem; min-height: 1.2em; }
      details summary { cursor: pointer; font-size: 0.85rem; margin-top: 8px; }
      .billing-status { display: inline-flex; align-items: center; gap: 7px; margin: 8px 0 12px; font-size: 0.88rem; }
      .billing-dot { width: 8px; height: 8px; border-radius: 50%; background: #9ca3af; }
      .billing-dot.good { background: #16a34a; }
      .billing-dot.warn { background: #d97706; }
      .billing-dot.bad { background: #dc2626; }
      .plans { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0; }
      .plan { border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px 14px; }
      .plan.current { border-color: #4f46e5; background: #eef2ff; }
      .plan-head { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-bottom: 2px; }
      .plan-name { font-weight: 700; font-size: 0.95rem; color: #111827; }
      .plan-badge {
        font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
        color: #4f46e5; background: white; border: 1px solid #c7d2fe; border-radius: 999px; padding: 2px 7px;
      }
      .plan-price { font-size: 0.8rem; color: #6b7280; margin-bottom: 8px; }
      .plan-limits { margin: 0; padding-left: 16px; color: #374151; font-size: 0.82rem; }
      .plan-limits li { margin: 2px 0; }
    </style>
  </head>
  <body>
    <header><h1>Archura</h1><span class="email" id="who"></span><span class="organization" id="current-org"></span><a class="account-link" href="/account/">Account</a>
      <button class="signout" id="signout">Sign out</button></header>
    <main id="main"></main>
    <script type="module">
      import { defaultComponents } from './../src/components/index.ts';

      const main = document.getElementById('main');
      const escapeHtml = (value) => String(value ?? '')
        .replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;').replaceAll("'", '&#039;');
      const tagFor = (embedName) =>
        defaultComponents.find((d) => `${d.path.at(-1)}.js` === embedName)?.tagName ?? null;
      const selectedOrganizationKey = 'archura:selected-organization';

      const daysRemaining = (value) => value
        ? Math.max(0, Math.ceil((new Date(value).getTime() - Date.now()) / 86400000))
        : null;

      const onDate = (value) => (value ? ` on ${new Date(value).toLocaleDateString()}` : '');

      // Two plans: Free (our own 2-day, no-card tier) and Basic ($5/mo with a
      // 14-day free trial). The entitlement flattens the Basic trial into
      // status 'active', so subscription_status tells the trial from a paid sub.
      function billingCopy(billing) {
        if (!billing) return { tone: 'bad', title: 'Billing unavailable', detail: 'Try again shortly.' };
        if (billing.status === 'active') {
          if (billing.subscription_status === 'trialing') {
            const days = daysRemaining(billing.current_period_end);
            return {
              tone: 'good',
              title: days != null ? `Basic trial — ${days} day${days === 1 ? '' : 's'} left` : 'Basic trial',
              detail: `Your card won't be charged until the trial ends${onDate(billing.current_period_end)}. After that it's $5/month for every site in this organization.`,
            };
          }
          if (billing.cancel_at_period_end) {
            return { tone: 'warn', title: 'Basic — canceling', detail: `Your plan stays active until it ends${onDate(billing.current_period_end)}; it won't renew.` };
          }
          return { tone: 'good', title: 'Basic plan — active', detail: `$5/month covers every site in this organization.${billing.current_period_end ? ` Renews${onDate(billing.current_period_end)}.` : ''}` };
        }
        if (billing.status === 'trialing') {
          const days = daysRemaining(billing.trial_ends_at);
          return {
            tone: days != null && days <= 1 ? 'warn' : 'good',
            title: days != null ? `Free plan — ${days} day${days === 1 ? '' : 's'} left` : 'Free plan',
            detail: 'The Free plan includes 1 hosted site and 3 designs. Add a card to start the 14-day Basic trial — 3 sites and 10 designs, free until it ends, then $5/month.',
          };
        }
        if (billing.status === 'grace') {
          return { tone: 'warn', title: 'Publishing paused', detail: `Your published sites stay live${billing.serve_grace_ends_at ? ` until ${new Date(billing.serve_grace_ends_at).toLocaleDateString()}` : ' during the grace period'}, but editing and publishing need the Basic plan.` };
        }
        if (billing.status === 'expired') {
          return { tone: 'bad', title: 'Plan ended', detail: 'Editing, publishing, and hosted pages are paused. Start the Basic plan to bring them back.' };
        }
        return { tone: '', title: 'Free plan', detail: 'Your 2-day Free plan starts when this organization first publishes — 1 site and 3 designs. Add a card any time to start the 14-day Basic trial.' };
      }

      function attributesFor(artifact, embedName) {
        const instance = [...(artifact?.content?.components ?? [])]
          .reverse()
          .find((component) => `${component.componentPath.at(-1)}.js` === embedName);
        if (!instance) return '';
        return Object.entries(instance.attributes ?? {})
          .filter(([name, value]) => !['id', 'class', 'style'].includes(name) && !name.startsWith('data-gjs') && value !== false && value != null)
          .map(([name, value]) => value === true ? name : `${name}="${String(value).replaceAll('&', '&amp;').replaceAll('"', '&quot;')}"`)
          .join(' ');
      }

      function renderRegister(message = '') {
        main.innerHTML = `
          <div class="card">
            <h2>Sign in or register</h2>
            <p class="hint">Enter your email — we'll send you a link. ${message}</p>
            <form><input name="email" type="email" placeholder="you@example.com" required />
            <button type="submit">Send link</button></form>
            <p class="error"></p>
          </div>`;
        main.querySelector('form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = main.querySelector('input').value.trim();
          const res = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
          }).catch(() => null);
          if (!res || !res.ok) {
            main.querySelector('.error').textContent =
              res?.status === 429 ? 'Too many attempts — wait a bit and try again.' :
              res?.status === 503 ? 'Unavailable — core is not running.' : 'Could not send the link.';
            return;
          }
          const localHint = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
            ? ' <a href="/dev-mail/">Running locally? Open the dev mailbox.</a>' : '';
          main.innerHTML = `<div class="card"><h2>Check your email</h2>
            <p class="hint">We sent a sign-in link to <strong>${email}</strong>.${localHint}</p></div>`;
        });
      }

      async function renderSite(site, siteUrl) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <h2>${site}</h2>
          <div class="actions">
            <a href="/edit/?site=${site}" data-edit>Edit</a>
            <a class="secondary" href="${siteUrl}" target="_blank">Open site</a>
          </div>
          <ul class="entries"><li>Loading…</li></ul>`;
        main.appendChild(card);

        // The "Open site" link is always present — a site the user owns is
        // reachable even before we can load its contents (e.g. a fresh deploy
        // they navigated away from). The list only enriches Edit + embed code.
        const list = await fetch(`/api/sites/${site}/list`)
          .then((r) => (r.ok ? r.json() : null))
          .catch(() => null);
        const ul = card.querySelector('.entries');
        if (!list) {
          ul.innerHTML = '<li>Not published yet — open the site to finish deploying.</li>';
          return;
        }
        const componentPath = list.componentPath ?? ['pages', 'Landing'];
        card.querySelector('[data-edit]').setAttribute('href', `/edit/?site=${site}&component=${componentPath.join('/')}`);
        ul.innerHTML =
          list.entries.map((e) => `<li>${e.kind}: ${e.path.join('/')}</li>`).join('') ||
          '<li>Nothing published yet.</li>';
        const artifact = await fetch(`/api/artifacts/${site}/${componentPath.join('/')}`)
          .then((r) => (r.ok ? r.json() : null))
          .catch(() => null);
        const embeds = list.entries.filter((e) => e.kind === 'embed');
        for (const embed of embeds) {
          const name = embed.path.at(-1);
          const tag = tagFor(name);
          if (!tag || !list.embedBase) continue;
          const attributes = attributesFor(artifact, name);
          const snippet = `<script type="module" src="${list.embedBase}/${name}"><\/script>\n<${tag}${attributes ? ` ${attributes}` : ''}></${tag}>`;
          const details = document.createElement('details');
          details.innerHTML = `<summary>Get embed code — ${name}</summary>
            <pre class="snippet">${snippet.replaceAll('<', '&lt;')}</pre>`;
          card.appendChild(details);
        }
      }

      function renderClaim(organization) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <h2>Claim a new site</h2>
          <p class="hint">Lowercase letters, digits, dashes.</p>
          <form><input name="site" placeholder="my-site" pattern="[a-z0-9][a-z0-9\\-]{1,38}[a-z0-9]" required />
          <button type="submit">Claim</button></form>
          <p class="error"></p>`;
        card.querySelector('form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const site = card.querySelector('input').value.trim().toLowerCase();
          const res = await fetch('/api/sites', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ site, organizationId: organization.id }),
          }).catch(() => null);
          if (!res || !res.ok) {
            card.querySelector('.error').textContent =
              res?.status === 409 ? 'That name is taken.' :
              res?.status === 403 ? 'Claiming is currently restricted.' : 'Invalid name.';
            return;
          }
          const { token, url } = await res.json();
          localStorage.setItem(`archura:site-token:${site}`, token);
          localStorage.setItem(`archura:site-url:${site}`, url);
          location.reload();
        });
        main.appendChild(card);
      }

      function renderOrganizationControls(me, selected) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <h2>Organization</h2>
          <p class="hint">The selected organization owns the sites and embed keys shown below.</p>
          <form class="select-org">
            <select name="organization" style="flex:1;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px">
              ${me.organizations.map((organization) => `<option value="${organization.id}" ${organization.id === selected.id ? 'selected' : ''}>${escapeHtml(organization.name)}</option>`).join('')}
            </select>
          </form>
          <details><summary>Create another organization</summary>
            <form class="create-org" style="margin-top:10px;flex-wrap:wrap">
              <input name="name" placeholder="Business name" required />
              <input name="slug" placeholder="business-slug" pattern="[a-z0-9](?:[a-z0-9\\-]{0,61}[a-z0-9])?" required />
              <button type="submit">Create</button>
            </form><p class="error"></p>
          </details>`;
        card.querySelector('select').addEventListener('change', (event) => {
          localStorage.setItem(selectedOrganizationKey, event.target.value);
          location.href = `/dashboard/?organization=${encodeURIComponent(event.target.value)}`;
        });
        card.querySelector('.create-org').addEventListener('submit', async (event) => {
          event.preventDefault();
          const form = event.currentTarget;
          const response = await fetch('/api/organizations', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: form.name.value.trim(), slug: form.slug.value.trim().toLowerCase() }),
          }).catch(() => null);
          if (!response?.ok) {
            card.querySelector('.error').textContent = response?.status === 409 ? 'That organization slug is taken.' : 'Could not create the organization.';
            return;
          }
          const organization = await response.json();
          localStorage.setItem(selectedOrganizationKey, organization.id);
          location.reload();
        });
        main.appendChild(card);
      }

      function renderBilling(organization) {
        const billing = organization.billing;
        const copy = billingCopy(billing);
        const card = document.createElement('div');
        card.className = 'card';
        const canManage = billing?.can_manage_billing;
        const portal = billing?.status === 'active' || billing?.current_period_end;
        const currentPlan =
          billing?.status === 'active' ? 'basic'
          : billing?.status === 'trialing' || billing?.status === 'unstarted' ? 'free'
          : null;
        const plan = (id, name, price, limits) => `
          <div class="plan${currentPlan === id ? ' current' : ''}">
            <div class="plan-head"><span class="plan-name">${name}</span>${currentPlan === id ? '<span class="plan-badge">Current</span>' : ''}</div>
            <div class="plan-price">${price}</div>
            <ul class="plan-limits">${limits.map((l) => `<li>${l}</li>`).join('')}</ul>
          </div>`;
        card.innerHTML = `
          <h2>Plan</h2>
          <div class="billing-status"><span class="billing-dot ${copy.tone}"></span><strong>${escapeHtml(copy.title)}</strong></div>
          <p class="hint">${escapeHtml(copy.detail)}</p>
          <div class="plans">
            ${plan('free', 'Free', '2 days · no card', ['1 hosted site', '3 designs'])}
            ${plan('basic', 'Basic', '$5/mo · 14-day free trial', ['3 hosted sites', '10 designs'])}
          </div>
          ${canManage ? `<div class="actions"><button data-billing-action="${portal ? 'portal' : 'checkout'}">${portal ? 'Manage billing' : 'Start Basic trial'}</button></div>` : '<p class="hint">Ask an organization owner to manage billing.</p>'}
          <p class="error" aria-live="polite"></p>`;
        card.querySelector('[data-billing-action]')?.addEventListener('click', async (event) => {
          const button = event.currentTarget;
          const action = button.dataset.billingAction;
          const message = card.querySelector('.error');
          button.disabled = true;
          const response = await fetch(`/api/organizations/${encodeURIComponent(organization.id)}/billing/${action}`, { method: 'POST' }).catch(() => null);
          const body = await response?.json().catch(() => null);
          if (!response?.ok || !body?.url) {
            button.disabled = false;
            message.textContent = body?.error?.message ?? body?.error ?? 'Could not open Stripe billing.';
            return;
          }
          location.href = body.url;
        });
        main.appendChild(card);
      }

      function renderInvite(organization) {
        if (organization.role !== 'owner') return;
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <h2>Invite a member</h2>
          <p class="hint">Invite another person to access this organization.</p>
          <form><input name="email" type="email" autocomplete="email" placeholder="member@example.com" required />
          <button type="submit">Send invitation</button></form>
          <p class="error"></p>`;
        card.querySelector('form').addEventListener('submit', async (event) => {
          event.preventDefault();
          const form = event.currentTarget;
          const message = card.querySelector('.error');
          const response = await fetch(`/api/organizations/${encodeURIComponent(organization.id)}/invitations`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: form.email.value.trim() }),
          }).catch(() => null);
          if (!response?.ok) {
            message.textContent = response?.status === 409 ? 'That account is already a member.' :
              response?.status === 429 ? 'Too many invitations. Please wait and try again.' :
              response?.status === 502 ? 'The invitation was saved, but its email failed. Retry to send it again.' :
              'Could not send the invitation.';
            return;
          }
          message.style.color = '#15803d';
          message.textContent = `Invitation sent to ${form.email.value.trim()}.`;
          form.reset();
        });
        main.appendChild(card);
      }

      async function init() {
        const pathAccount = location.pathname.match(/^\/([0-9a-fA-F][0-9a-fA-F-]{7,})\/dashboard\/?$/)?.[1] ?? null;
        const me = await fetch('/api/me').then((r) => (r.ok ? r.json() : null)).catch(() => null);
        if (!me) {
          renderRegister(pathAccount ? 'This dashboard belongs to a signed-out account — enter its email to get a fresh link.' : '');
          return;
        }
        // Canonical URL is plain /dashboard/; a legacy /<accountId>/ path for
        // a different account gets a pointer instead of someone else's data
        if (pathAccount && pathAccount.toLowerCase() !== String(me.id).toLowerCase()) {
          main.innerHTML = `<div class="card"><h2>Different account</h2>
            <p class="hint">You are signed in as <strong>${escapeHtml(me.email)}</strong>.</p>
            <div class="actions"><a href="/dashboard/">Open your dashboard</a></div></div>`;
          return;
        }
        document.getElementById('who').textContent = me.email;
        const signout = document.getElementById('signout');
        signout.style.display = 'inline-block';
        signout.addEventListener('click', async () => {
          await fetch('/api/logout', { method: 'POST' }).catch(() => {});
          location.href = '/account/';
        });
        main.innerHTML = '';
        const requestedOrganization = new URLSearchParams(location.search).get('organization');
        const preferredOrganization = requestedOrganization ?? localStorage.getItem(selectedOrganizationKey);
        const organization = me.organizations.find((candidate) => candidate.id === preferredOrganization)
          ?? me.organizations.find((candidate) => candidate.is_default)
          ?? me.organizations[0];
        if (!organization) {
          main.innerHTML = '<div class="card"><h2>No organization</h2><p class="error">Your account needs a default organization.</p></div>';
          return;
        }
        localStorage.setItem(selectedOrganizationKey, organization.id);
        document.getElementById('current-org').textContent = `· ${organization.name}`;
        renderOrganizationControls(me, organization);
        renderBilling(organization);
        renderInvite(organization);
        for (const site of organization.sites) await renderSite(site, organization.siteUrls?.[site] ?? `/s/${site}/`);
        if (organization.sites.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'card';
          empty.innerHTML = '<h2>No sites yet</h2><p class="hint">Claim a subdomain below, or build first in the <a href="/edit/">editor</a> and deploy from there.</p>';
          main.appendChild(empty);
        }
        renderClaim(organization);
      }
      init();
    </script>
  </body>
</html>
