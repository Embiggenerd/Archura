<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Archura Component Demo</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #f3f4f6;
        font-family: system-ui, sans-serif;
        color: #111827;
      }
      .bar {
        display: flex;
        align-items: baseline;
        gap: 12px;
        padding: 12px 24px;
        background: white;
        border-bottom: 1px solid #e5e7eb;
        font-size: 0.85rem;
      }
      .bar strong {
        font-size: 0.95rem;
      }
      .bar #info {
        color: #6b7280;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        word-break: break-all;
      }
      .bar a {
        margin-left: auto;
        color: #2563eb;
      }
      #root {
        padding: 24px;
        max-width: 640px;
      }
    </style>
  </head>
  <body>
    <header class="bar">
      <strong>Component demo</strong>
      <span id="info">Loading…</span>
      <a id="edit-link" href="/edit/">Open in editor</a>
    </header>
    <div id="root"></div>

    <script type="module" src="/src/demo.js"></script>
  </body>
</html>
