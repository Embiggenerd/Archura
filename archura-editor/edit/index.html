<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Archura Editor</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: #f3f4f6;
        font-family: Helvetica, Arial, sans-serif;
      }

      archura-editor {
        display: block;
        flex: 1;
        min-height: 0;
        padding: 16px;
        box-sizing: border-box;
      }

      archura-canvas .gjs-container {
        height: 100%;
        overflow: hidden;
      }

      .site-bar {
        display: flex;
        align-items: baseline;
        gap: 8px;
        padding: 10px 24px;
        background: #111827;
        color: #e5e7eb;
        font-size: 0.85rem;
      }

      .site-bar a {
        color: #93c5fd;
      }

      .claim,
      .picker {
        max-width: 460px;
        margin: 12vh auto 0;
        padding: 32px;
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
      }

      .claim h1,
      .picker h1 {
        margin: 0 0 4px;
        font-size: 1.4rem;
      }

      .claim p,
      .picker p {
        margin: 0 0 20px;
        color: #6b7280;
        font-size: 0.9rem;
      }

      .claim form {
        display: flex;
        gap: 8px;
      }

      .claim input {
        flex: 1;
        padding: 10px 12px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 0.95rem;
      }

      .claim button {
        padding: 10px 18px;
        border: none;
        border-radius: 8px;
        background: #111827;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }

      .claim .error {
        margin: 12px 0 0;
        color: #dc2626;
        font-size: 0.85rem;
        min-height: 1.2em;
      }

      .picker-group {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #9ca3af;
        margin: 14px 0 6px;
      }

      .picker a {
        display: block;
        padding: 10px 12px;
        border-radius: 8px;
        color: #111827;
        text-decoration: none;
        font-size: 0.95rem;
      }

      .picker a:hover {
        background: #f3f4f6;
      }

      /* Overlay + modal styles come from funnel-ui.js (shared with the front page) */

      .site-bar button, .site-bar a.button {
        margin-left: 8px; padding: 5px 12px; border: none; border-radius: 6px;
        background: #4f46e5; color: white; font-size: 0.8rem; font-weight: 600;
        cursor: pointer; text-decoration: none;
      }
      .site-bar button.secondary { background: #374151; }

      .publish-panel {
        padding: 10px 24px; background: #ecfdf5; border-bottom: 1px solid #a7f3d0;
        font-size: 0.85rem; color: #065f46;
      }
      .publish-panel pre {
        background: #111827; color: #e5e7eb; padding: 10px; border-radius: 8px;
        overflow-x: auto; font-size: 0.75rem; margin: 8px 0 0;
      }
      .publish-panel summary { cursor: pointer; margin-top: 6px; }
      .billing-notice {
        padding: 11px 24px; background: #fff7ed; border-bottom: 1px solid #fed7aa;
        color: #9a3412; font-size: 0.86rem;
      }
      archura-editor.billing-readonly { pointer-events: none; opacity: 0.78; }
    </style>
  </head>
  <body>
    <script type="module">
      import './../src/index.ts';
      import { defaultComponents } from './../src/components/index.ts';
      import { createFileSystemAdapter, createR2Adapter } from './../src/adapters/index.ts';
      import { ensureFunnelStyles, showDeployModal, showRegisterModal } from './funnel-ui.js';
      import { showUpgradeModal } from './../src/upgrade-modal.ts';
      ensureFunnelStyles(); // the claim screen builds its own .overlay

      const params = new URLSearchParams(location.search);
      const site = params.get('site');
      const component = params.get('component') ?? (site ? 'pages/Landing' : null);

      // In the built app, component modules are the self-contained bundles
      // served by the Worker, not raw Vite source
      const components = import.meta.env.PROD
        ? defaultComponents.map((def) => ({ ...def, moduleUrl: `/components/${def.path.join('/')}.js` }))
        : undefined;

      async function uploadAsset(blob, name) {
        const ext = (name.split('.').pop() || 'png').toLowerCase();
        const targetSite = site ?? 'dev';
        const token = site ? localStorage.getItem(`archura:site-token:${site}`) : null;
        const response = await fetch(`/api/assets/${targetSite}/upload.${ext}`, {
          method: 'PUT',
          headers: token ? { Authorization: `Bearer ${token}` } : {},
          body: blob,
        });
        if (!response.ok) throw new Error(`Asset upload failed (${response.status})`);
        return (await response.json()).url;
      }

      function mountEditor(persistence, componentPath = component) {
        const editor = document.createElement('archura-editor');
        editor.id = 'editor';
        if (componentPath) editor.componentPath = componentPath.split('/');
        if (components) editor.components = components;
        editor.persistence = persistence;
        editor.uploadAsset = uploadAsset;
        editor.addEventListener('archura:target-select', (e) => {
          const url = new URL(location.href);
          url.searchParams.set('component', e.detail.path.join('/'));
          history.replaceState(null, '', url);
        });
        document.body.appendChild(editor);
        return editor;
      }

      // --- Publish panel (site mode only; deploy/register modals come from funnel-ui.js) ---

      function embedAttributes(artifact, name) {
        const instance = [...(artifact.content?.components ?? [])]
          .reverse()
          .find((candidate) => `${candidate.componentPath.at(-1)}.js` === name);
        return Object.entries(instance?.attributes ?? {})
          .filter(([attribute, value]) => !['id', 'class', 'style'].includes(attribute) && !attribute.startsWith('data-gjs') && value !== false && value != null)
          .map(([attribute, value]) => value === true ? attribute : `${attribute}="${String(value).replaceAll('&', '&amp;').replaceAll('"', '&quot;')}"`)
          .join(' ');
      }

      function embedSnippets(artifact, list) {
        if (!list?.embedBase) return [];
        return list.entries
          .filter((entry) => entry.kind === 'embed')
          .map((entry) => entry.path.at(-1))
          .map((name) => [name, defaultComponents.find((definition) => `${definition.path.at(-1)}.js` === name)?.tagName])
          .filter(([, tag]) => tag)
          .map(([name, tag]) => {
            const attributes = embedAttributes(artifact, name);
            return `<script type="module" src="${list.embedBase}/${name}"><\/script>\n<${tag}${attributes ? ` ${attributes}` : ''}></${tag}>`;
          });
      }

      // After a real publish, surface the live link + copyable embed snippets
      function attachPublishPanel(editorEl, siteName, siteUrl) {
        editorEl.addEventListener('artifactsave', async (e) => {
          if (!e.detail.published) return;
          const [artifact] = e.detail.artifacts;
          const token = localStorage.getItem(`archura:site-token:${siteName}`);
          const list = await fetch(`/api/sites/${siteName}/list`, {
            headers: token ? { Authorization: `Bearer ${token}` } : {},
          }).then((response) => response.ok ? response.json() : null).catch(() => null);
          document.querySelector('.publish-panel')?.remove();
          const panel = document.createElement('div');
          panel.className = 'publish-panel';
          const snippets = embedSnippets(artifact, list)
            .map((s) => `<details><summary>Embed snippet</summary><pre>${s.replaceAll('<', '&lt;')}</pre></details>`)
            .join('');
          panel.innerHTML = `Published ✓ — live at <a href="${siteUrl}" target="_blank">${siteUrl}</a>${snippets}`;
          document.body.insertBefore(panel, document.getElementById('editor'));
        });
      }

      function showPicker() {
        const groups = [
          ['page', 'Page-sized components'],
          ['component', 'Smaller components'],
        ];
        const el = document.createElement('div');
        el.className = 'picker';
        el.innerHTML =
          '<h1>Pick something to edit</h1><p>Choose a page or component to open in the editor.</p>' +
          groups
            .map(([kind, heading]) => {
              const items = defaultComponents.filter((d) => d.kind === kind);
              if (!items.length) return '';
              return (
                `<div class="picker-group">${heading}</div>` +
                items
                  .map((d) => `<a href="?component=${d.path.join('/')}">${d.label ?? d.path.at(-1)}</a>`)
                  .join('')
              );
            })
            .join('');
        document.body.appendChild(el);
      }

      function showClaimScreen() {
        const overlay = document.createElement('div');
        overlay.className = 'overlay';
        overlay.addEventListener('click', (e) => {
          if (e.target === overlay) overlay.remove();
        });
        const el = document.createElement('div');
        el.className = 'claim';
        el.innerHTML = `
          <h1>Claim your site</h1>
          <p>Pick a name, build your page, hit publish. It goes live immediately.</p>
          <form>
            <input name="site" placeholder="my-site" autocomplete="off"
                   pattern="[a-z0-9][a-z0-9\\-]{1,38}[a-z0-9]" required />
            <button type="submit">Claim</button>
          </form>
          <p class="error"></p>
        `;
        el.querySelector('form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const name = el.querySelector('input').value.trim().toLowerCase();
          const errorEl = el.querySelector('.error');
          try {
            const response = await fetch('/api/sites', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ site: name }),
            });
            if (!response.ok) {
              errorEl.textContent =
                response.status === 409
                  ? 'That name is taken.'
                  : response.status === 403
                    ? 'Claiming new sites is currently restricted.'
                    : 'Invalid name — lowercase letters, digits, dashes.';
              return;
            }
            const { site, token, url } = await response.json();
            localStorage.setItem(`archura:site-token:${site}`, token);
            localStorage.setItem(`archura:site-url:${site}`, url);
            location.href = `/edit/?site=${site}`;
          } catch {
            errorEl.textContent = 'Could not reach the server.';
          }
        });
        overlay.appendChild(el);
        document.body.appendChild(overlay);
      }

      async function initPage() {
      if (site) {
        const token = localStorage.getItem(`archura:site-token:${site}`);
        const url = localStorage.getItem(`archura:site-url:${site}`);
        const siteUrl = url ?? `/s/${site}/`;
        const me = await fetch('/api/me').then((response) => response.ok ? response.json() : null).catch(() => null);
        const organization = me?.organizations?.find((candidate) => candidate.sites?.includes(site));
        const readOnly = organization?.billing?.can_edit === false;
        const bar = document.createElement('div');
        bar.className = 'site-bar';
        bar.innerHTML = `<strong>${site}</strong> <span>publishes to</span> <a href="${siteUrl}" target="_blank">${siteUrl}</a>
          <span style="flex:1"></span>
          <a class="button secondary" href="/dashboard/">Dashboard</a>`;
        document.body.appendChild(bar);
        const persistence = createR2Adapter({ endpoint: `/api/artifacts/${site}`, token: token ?? undefined, site });
        const guardedPersistence = readOnly ? {
          ...persistence,
          put: async () => { throw new Error('An active subscription is required to publish.'); },
        } : persistence;
        if (readOnly) {
          const notice = document.createElement('div');
          notice.className = 'billing-notice';
          notice.innerHTML = `This organization is read-only until an owner starts the Basic plan ($5/month, with a 14-day free trial). <a href="/dashboard/?organization=${encodeURIComponent(organization.id)}">Manage billing</a>`;
          document.body.appendChild(notice);
          // Time-limit boundary: the free trial has ended, so editing/publishing is
          // paused. Surface the upgrade path as a modal, with the notice persisting.
          const ended = organization.billing?.status === 'grace'
            ? 'Your free trial has ended — your published sites stay live for a short grace period.'
            : 'Your free trial has ended, so editing and publishing are paused.';
          showUpgradeModal(organization, ended);
        }
        const editorEl = mountEditor(guardedPersistence);
        if (readOnly) {
          editorEl.classList.add('billing-readonly');
          editorEl.setAttribute('aria-disabled', 'true');
        }
        attachPublishPanel(editorEl, site, siteUrl);
      } else if (import.meta.env.PROD) {
        // Anonymous draft mode (funnel flow 2): edit first; Deploy captures
        // the subdomain + email; nothing goes live until the email confirms.
        const bar = document.createElement('div');
        bar.className = 'site-bar';
        bar.innerHTML = `<strong>Draft</strong> <span>editing anonymously — deploy to pick a name and go live</span>
          <span style="flex:1"></span>
          <button class="deploy-open">Deploy</button>
          <button class="secondary claim-open">Claim a site</button>
          <button class="secondary register-open">Sign in</button>`;
        document.body.appendChild(bar);
        const editorEl = mountEditor(undefined, component ?? 'pages/Landing');
        bar.querySelector('.deploy-open').addEventListener('click', () => showDeployModal(editorEl, components));
        bar.querySelector('.claim-open').addEventListener('click', () => showClaimScreen());
        bar.querySelector('.register-open').addEventListener('click', () => showRegisterModal());
        // Signed-in users don't need Register — show the way back instead
        fetch('/api/me').then((r) => {
          if (!r.ok) return;
          const register = bar.querySelector('.register-open');
          const dash = document.createElement('a');
          dash.className = 'button secondary';
          dash.href = '/dashboard/';
          dash.textContent = 'Dashboard';
          register.replaceWith(dash);
        }).catch(() => {});
      } else if (component) {
        mountEditor(createFileSystemAdapter());
      } else {
        // Bare /edit in dev: choose what to edit.
        showPicker();
      }
      }
      void initPage();
    </script>
  </body>
</html>
