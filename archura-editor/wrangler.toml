name = "archura-sites"
main = "workers/site-worker.js"
compatibility_date = "2026-07-01"
workers_dev = true

routes = [
  { pattern = "archura.ai/*", zone_name = "archura.ai" },
  { pattern = "*.archura.ai/*", zone_name = "archura.ai" },
]

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true

[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "archura-artifacts"

[[ratelimits]]
name = "CORE_RATE_LIMITER"
namespace_id = "1001"
  [ratelimits.simple]
  limit = 300
  period = 60

[vars]
# Cloudflare zone serving wildcard subdomains; empty = path-based sites only (/s/<name>/)
ROOT_DOMAIN = "archura.ai"
# IPs allowed to claim new sites (comma-separated, trailing * = prefix match).
# Empty = open claiming. Loopback is always allowed for local dev.
CLAIM_IP_ALLOWLIST = "72.132.36.124,2603:8001:2400:2ac0:*"
# Core proxy target. CORE_SERVICE_KEY must be set with `wrangler secret put` in
# production or in `.dev.vars` for local Worker→core verification.
CORE_URL = "https://archura-core.fly.dev"
