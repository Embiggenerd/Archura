name = "archura-sites"
main = "workers/site-worker.js"
compatibility_date = "2026-07-15"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Split domains: envelopment.ai is the app + marketing front door; published
# customer sites (untrusted content) live on *.archura.ai so they can never
# set or toss cookies the app sees. No *.envelopment.ai route on purpose —
# stray subdomains of the app domain don't resolve, and staging-core reaches
# the core box without needing a route exclusion.
routes = [
  { pattern = "envelopment.ai/*", zone_name = "envelopment.ai" },
  { pattern = "archura.ai/*", zone_name = "archura.ai" },
  { pattern = "*.archura.ai/*", zone_name = "archura.ai" },
]

[triggers]
crons = ["17 4 * * *"]

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true

[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "archura-artifacts"

[[ratelimits]]
name = "CORE_RATE_LIMITER"
namespace_id = "1001"
  [ratelimits.simple]
  limit = 60
  period = 60

[vars]
# Cloudflare zone serving wildcard subdomains; empty = path-based sites only (/s/<name>/)
ROOT_DOMAIN = "archura.ai"
# The app's own origin — the bare sites domain redirects here.
APP_ORIGIN = "https://envelopment.ai"
# This deployment is staging: edge rate limits off, mirroring core (whose
# limiters only enforce under ARCHURA_ENV=prod). The prod worker config, when
# it exists, must NOT set this.
DISABLE_EDGE_RATE_LIMITS = "true"
# Core target. CORE_SERVICE_KEY (transport) and CORE_INTERNAL_KEY (per-request
# auth for machine endpoints: entitlement reads, billing-recovery release) must
# be set with `wrangler secret put` in production or in `.dev.vars` locally.
# MODERATION_ADMIN_KEY is also a Worker secret; it protects the manual
# moderation list and suspend/restore endpoints.
# ALLOW_CORE_DEV_PROXY is dev-only and must never be set in production.
CORE_URL = "https://staging-core.envelopment.ai"
# ALLOW_ANONYMOUS_SITE_CLAIMS is intentionally omitted. dev-up.sh sets it
# explicitly for local claim-token compatibility; production requires sessions.

[observability]
enabled = true

  [observability.logs]
  enabled = true
  head_sampling_rate = 1

  [observability.traces]
  enabled = true
  head_sampling_rate = 0.01
