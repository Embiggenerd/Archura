<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Archura Deploy Preview</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #f3f4f6;
      }

      .bar {
        display: flex;
        align-items: baseline;
        gap: 12px;
        padding: 12px 24px;
        background: white;
        border-bottom: 1px solid #e5e7eb;
        font: 0.85rem/1.4 Helvetica, Arial, sans-serif;
        color: #111827;
      }

      .bar strong {
        font-size: 0.95rem;
      }

      .bar .meta {
        color: #6b7280;
      }

      .bar a {
        margin-left: auto;
        color: #2563eb;
      }

      #root {
        padding: 24px;
      }

      .empty {
        font: 0.95rem/1.5 Helvetica, Arial, sans-serif;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <header class="bar">
      <strong>Deploy preview</strong>
      <span id="target"></span>
      <span class="meta" id="meta"></span>
      <a id="editor-link" href="/">Open editor</a>
    </header>
    <div id="root"></div>
    <script type="module">
      const component = new URLSearchParams(location.search).get('component');
      document.getElementById('target').textContent = component ?? '(no component)';
      document.getElementById('editor-link').href = component ? `/?component=${component}` : '/';

      // The only editor-independent runtime dependency: the component's own module
      if (component) import(`/src/components/${component}.js`);

      let lastUpdated = null;

      async function render() {
        const root = document.getElementById('root');
        const response = component && (await fetch(`/api/artifacts/${component}`).catch(() => null));
        if (!response?.ok) {
          root.innerHTML = `<p class="empty">No published artifact yet. Open the editor and click Publish.</p>`;
          document.getElementById('meta').textContent = '';
          lastUpdated = null;
          return;
        }
        const artifact = await response.json();
        if (artifact.meta.updatedAt === lastUpdated) return;
        lastUpdated = artifact.meta.updatedAt;
        root.innerHTML = `<style>${artifact.snapshot.css}</style>${artifact.snapshot.html}`;
        document.getElementById('meta').textContent = `published ${artifact.meta.updatedAt}`;
      }

      render();
      // Poll the store so a publish from the editor tab shows up without a refresh
      setInterval(render, 2000);
    </script>
  </body>
</html>
