<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Archura v2 Demo</title>
    <script type="module" src="./src/index.ts"></script>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f3f4f6;
      }

      archura-editor {
        display: block;
        min-height: 100vh;
        padding: 24px;
        box-sizing: border-box;
      }

      archura-canvas .gjs-container {
        height: 100%;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <archura-editor id="editor"></archura-editor>
    <script>
      const component = new URLSearchParams(location.search).get('component');
      if (component) document.getElementById('editor').setAttribute('component-path', component);
    </script>
  </body>
</html>
