<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Archura v2 Demo</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f3f4f6;
      }

      archura-editor {
        display: block;
        min-height: 100vh;
        padding: 24px;
        box-sizing: border-box;
      }

      archura-canvas .gjs-container {
        height: 100%;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import './src/index.ts';
      import { createFileSystemAdapter } from './src/adapters/index.ts';

      // This page is the reference host: it wires a persistence adapter and
      // owns nothing else. Created programmatically so every property is set
      // before the element's first render.
      const editor = document.createElement('archura-editor');
      editor.id = 'editor';
      const component = new URLSearchParams(location.search).get('component');
      if (component) editor.componentPath = component.split('/');
      editor.persistence = createFileSystemAdapter();
      document.body.appendChild(editor);
    </script>
  </body>
</html>
