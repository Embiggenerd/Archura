name: archura-core

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  core:
    image: ${CORE_IMAGE:?Set CORE_IMAGE to an immutable tag or digest in release.env}
    restart: unless-stopped
    environment:
      ARCHURA_ENV: ${ARCHURA_ENV:?Set ARCHURA_ENV in .env}
      PORT: "8080"
      METRICS_PORT: "9091"
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      PLATFORM_ADMIN_KEY: ${PLATFORM_ADMIN_KEY:?Set PLATFORM_ADMIN_KEY in .env}
      CORE_SERVICE_KEY: ${CORE_SERVICE_KEY:?Set CORE_SERVICE_KEY in .env}
      CORE_INTERNAL_KEY: ${CORE_INTERNAL_KEY:?Set CORE_INTERNAL_KEY in .env}
      CONFIRM_URL_BASE: ${CONFIRM_URL_BASE:?Set CONFIRM_URL_BASE in .env}
      CLOUDFLARE_EMAIL_ACCOUNT_ID: ${CLOUDFLARE_EMAIL_ACCOUNT_ID:?Set CLOUDFLARE_EMAIL_ACCOUNT_ID in .env}
      CLOUDFLARE_EMAIL_API_TOKEN: ${CLOUDFLARE_EMAIL_API_TOKEN:?Set CLOUDFLARE_EMAIL_API_TOKEN in .env}
      EMAIL_FROM: ${EMAIL_FROM:?Set EMAIL_FROM in .env}
      ADMIN_API_ENABLED: ${ADMIN_API_ENABLED:-false}
      # Stripe billing (test or live). Optional as a group: leave all four
      # unset to run with billing disabled; set all four to enable it. `:-`
      # (not `:?`) so their absence does not block core from starting.
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_BASIC_PRICE_ID: ${STRIPE_BASIC_PRICE_ID:-}
      BILLING_PUBLIC_ORIGIN: ${BILLING_PUBLIC_ORIGIN:-}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
      - "9091"
    networks:
      - edge
      - database
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/readyz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 20s

  caddy:
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    restart: unless-stopped
    environment:
      CORE_HOSTNAME: ${CORE_HOSTNAME:?Set CORE_HOSTNAME in .env}
    depends_on:
      core:
        condition: service_healthy
    ports:
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/etc/caddy/certs:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - edge
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true

  maintenance:
    image: ${CORE_IMAGE:?Set CORE_IMAGE to an immutable tag or digest in release.env}
    profiles: ["jobs"]
    entrypoint: ["/maintenance"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - database
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      disable: true

  # One-shot: bootstrap the platform workspace and grant staff to
  # PLATFORM_OWNER_EMAIL. Idempotent — deploy.sh runs it on every release, so the
  # grant self-heals the first time that account signs up. (Same job the dev
  # stack runs via `adminctl grant-staff` in scripts/dev-up.sh.)
  adminctl:
    image: ${CORE_IMAGE:?Set CORE_IMAGE to an immutable tag or digest in release.env}
    profiles: ["jobs"]
    entrypoint: ["/adminctl"]
    environment:
      ARCHURA_ENV: ${ARCHURA_ENV:?Set ARCHURA_ENV in .env}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      PLATFORM_OWNER_EMAIL: ${PLATFORM_OWNER_EMAIL:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - database
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      disable: true

networks:
  edge:
  database:

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
